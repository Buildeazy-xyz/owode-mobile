name: Build Android AAB
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Remove signing config
        run: |
          sed -i 's/signingConfig signingConfigs.release/\/\/ signingConfig signingConfigs.release/g' android/app/build.gradle

      - name: Build UNSIGNED AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload Unsigned AAB
        uses: actions/upload-artifact@v4
        with:
          name: owode-release-unsigned
          path: android/app/build/outputs/bundle/release/app-release.aab
